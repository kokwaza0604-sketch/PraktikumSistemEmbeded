; PlatformIO Project Configuration
; Framework: STM32Cube HAL
; PILIH SALAH SATU MCU DI BAWAH:
;   - bluepill_f103c8   : STM32F103C8T6 (Blue Pill, 72MHz)
;   - stm32f401cc       : STM32F401CCU6 (84MHz)
;   - stm32f411ce       : STM32F411CEU6 (100MHz)

[platformio]
default_envs = stm32f401cc

[env:bluepill_f103c8]
platform = ststm32
board = genericSTM32F103C8
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
build_flags = 
    -D USE_HAL_DRIVER
    -D STM32F103xC
    -D HSE_VALUE=8000000
    -I include

[env:stm32f401cc]
platform = ststm32
board = genericSTM32F401CC
framework = stm32cube
upload_protocol = stlink
monitor_speed = 115200
build_flags = 
    -D USE_HAL_DRIVER
    -D STM32F401xC
    -D HSE_VALUE=25000000
    -I include

[env:stm32f411ce]
platform = ststm32
board = genericSTM32F411CE
framework = stm32cube
upload_protocol = stlink
monitor_speed = 115200
build_flags = 
    -D USE_HAL_DRIVER
    -D STM32F411xE
    -D HSE_VALUE=25000000
    -I include
